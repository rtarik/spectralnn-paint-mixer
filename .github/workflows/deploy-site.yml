name: Deploy Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/site/**"
      - "packages/js/**"
      - "artifacts/**"
      - ".github/workflows/deploy-site.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install released runtimes
        run: node apps/site/scripts/install-release-runtimes.mjs

      - name: Build released site
        run: node apps/site/scripts/build-release-site.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
