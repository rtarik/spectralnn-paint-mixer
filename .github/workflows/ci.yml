name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  js-and-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test JS package
        run: npm test
        working-directory: packages/js

      - name: Smoke test landing page
        run: node apps/site/scripts/smoke-site.mjs

  kotlin-jvm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Kotlin JVM tests
        run: ./gradlew :spectralnn-paint-mixer-kotlin:jvmTest
